const { useState, useEffect, useRef } = React;

/* ── Intersection hook ── */
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

/* ── Cursor ── */
function Cursor() {
  useEffect(() => {
    const c = document.getElementById('cursor');
    const r = document.getElementById('cursor-ring');
    let rx = 0, ry = 0;
    const move = e => { c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'; };
    let frame;
    const animate = () => {
      rx += (parseFloat(c.style.left||0) - rx) * .14;
      ry += (parseFloat(c.style.top||0)  - ry) * .14;
      r.style.left = rx+'px'; r.style.top = ry+'px';
      frame = requestAnimationFrame(animate);
    };
    window.addEventListener('mousemove', move);
    frame = requestAnimationFrame(animate);
    return () => { window.removeEventListener('mousemove', move); cancelAnimationFrame(frame); };
  }, []);
  return null;
}

                          <span className="font-mono text-[9px] tracking-[0.12em] uppercase bg-amberDim border border-amberLine text-amber px-2 py-0.5 normal-case" style={{fontSize:'9px',letterSpacing:'0.12em'}}>

                  </a>
                </div>

                {/* desc */}
                <p className="font-serif text-base text-fade leading-relaxed mb-5 md:pl-10 max-w-2xl">{p.desc}</p>

                      </span>

                  </div>
                  <div className="flex gap-4">
                    {p.highlights.map(h => (
                      <span key={h} className="font-mono text-[9px] tracking-[0.1em] text-dim flex items-center gap-1.5">
                        <span className="w-1 h-1 rounded-full bg-amber/40"></span>{h}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
